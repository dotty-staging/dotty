<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scala 3 Compiler - Browser Test</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 2em auto; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; }
    button { padding: 8px 16px; font-size: 14px; margin: 8px 4px 8px 0; }
    button:disabled { opacity: 0.5; }
    #output { background: #1e1e1e; color: #d4d4d4; padding: 1em; white-space: pre-wrap; min-height: 100px;
             border-radius: 6px; font-size: 13px; line-height: 1.5; }
    #status { color: #666; margin-bottom: 4px; }
    .ansi-bold { font-weight: bold; }
    .ansi-red { color: #f44747; }
    .ansi-green { color: #6a9955; }
    .ansi-yellow { color: #dcdcaa; }
    .ansi-blue { color: #569cd6; }
    .ansi-magenta { color: #c586c0; }
    .ansi-cyan { color: #4ec9b0; }
    .ansi-white { color: #d4d4d4; }
    .ansi-bright-red { color: #f14c4c; }
    .ansi-bright-green { color: #73c991; }
    .ansi-bright-yellow { color: #e5e510; }
    .ansi-bright-blue { color: #3b8eea; }
    .ansi-bright-magenta { color: #d670d6; }
    .ansi-bright-cyan { color: #29b8db; }
    .ansi-bright-white { color: #e5e5e5; }

    .progress-container { display: none; width: 100%; margin-bottom: 12px; }
    .progress-container.active { display: block; }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .progress-label { width: 140px; text-align: right; font-size: 13px; }
    .progress-bar { flex: 1; height: 18px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4a9; border-radius: 4px; transition: width 0.15s; width: 0%; }
    .progress-text { width: 70px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Scala 3 Compiler in the Browser</h1>
  <p id="status">Loading...</p>

  <div id="progress" class="progress-container">
    <div class="progress-row">
      <span class="progress-label">main.js</span>
      <div class="progress-bar"><div id="bar-js" class="progress-fill"></div></div>
      <span id="pct-js" class="progress-text">0%</span>
    </div>
    <div class="progress-row">
      <span class="progress-label">classpath.bin</span>
      <div class="progress-bar"><div id="bar-cp" class="progress-fill"></div></div>
      <span id="pct-cp" class="progress-text">0%</span>
    </div>
    <div class="progress-row">
      <span class="progress-label">linker-libs.bin</span>
      <div class="progress-bar"><div id="bar-ll" class="progress-fill"></div></div>
      <span id="pct-ll" class="progress-text">0%</span>
    </div>
  </div>

  <textarea id="source">@main def main() = println("Hello from Scala.js in the browser!")</textarea>
  <br>
  <button id="compile" disabled>Compile</button>
  <button id="compileAndRun" disabled>Compile &amp; Run</button>
  <h2>Output</h2>
  <div id="output"></div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');
      const compileBtn = document.getElementById('compile');
      const compileAndRunBtn = document.getElementById('compileAndRun');
      const sourceEl = document.getElementById('source');
      const progressEl = document.getElementById('progress');

      // Fetch with progress tracking
      function fetchWithProgress(url, barEl, pctEl) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.responseType = 'arraybuffer';
          xhr.onprogress = (e) => {
            if (e.lengthComputable) {
              const pct = Math.round((e.loaded / e.total) * 100);
              barEl.style.width = pct + '%';
              pctEl.textContent = pct + '%';
            } else {
              const mb = (e.loaded / 1048576).toFixed(1);
              pctEl.textContent = mb + ' MB';
              barEl.style.width = '50%';
            }
          };
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              barEl.style.width = '100%';
              pctEl.textContent = '100%';
              resolve(xhr.response);
            } else {
              reject(new Error(`HTTP ${xhr.status} for ${url}`));
            }
          };
          xhr.onerror = () => reject(new Error(`Network error fetching ${url}`));
          xhr.send();
        });
      }

      // Show progress bars and start all downloads in parallel
      statusEl.textContent = 'Downloading compiler, classpath, and linker libs...';
      progressEl.classList.add('active');

      const barJs = document.getElementById('bar-js');
      const pctJs = document.getElementById('pct-js');
      const barCp = document.getElementById('bar-cp');
      const pctCp = document.getElementById('pct-cp');
      const barLl = document.getElementById('bar-ll');
      const pctLl = document.getElementById('pct-ll');

      let jsBuf, cpBuf, llBuf;
      try {
        [jsBuf, cpBuf, llBuf] = await Promise.all([
          fetchWithProgress('main.js', barJs, pctJs),
          fetchWithProgress('classpath.bin', barCp, pctCp),
          fetchWithProgress('linker-libs.bin', barLl, pctLl),
        ]);
      } catch (e) {
        statusEl.textContent = 'Download failed: ' + e.message;
        return;
      }

      // Load main.js via a Blob <script> tag (let declarations need script scope, not eval)
      statusEl.textContent = 'Initializing compiler...';
      await new Promise((resolve, reject) => {
        const blob = new Blob([jsBuf], { type: 'application/javascript' });
        const script = document.createElement('script');
        script.src = URL.createObjectURL(blob);
        script.onload = () => { URL.revokeObjectURL(script.src); resolve(); };
        script.onerror = () => reject(new Error('Failed to execute main.js'));
        document.head.appendChild(script);
      });

      // Load classpath blob
      statusEl.textContent = 'Loading classpath...';
      DottyCompiler.loadClasspath(cpBuf);

      // Load linker libraries
      statusEl.textContent = 'Loading linker libraries...';
      DottyCompiler.loadLinkerLibs(llBuf);

      progressEl.classList.remove('active');
      statusEl.textContent = 'Ready!';
      compileBtn.disabled = false;
      compileAndRunBtn.disabled = false;

      // Convert ANSI escape sequences to HTML spans
      function ansiToHtml(text) {
        const colorMap = {
          '30': 'ansi-black', '31': 'ansi-red', '32': 'ansi-green', '33': 'ansi-yellow',
          '34': 'ansi-blue', '35': 'ansi-magenta', '36': 'ansi-cyan', '37': 'ansi-white',
          '90': 'ansi-bright-red', '91': 'ansi-bright-red', '92': 'ansi-bright-green',
          '93': 'ansi-bright-yellow', '94': 'ansi-bright-blue', '95': 'ansi-bright-magenta',
          '96': 'ansi-bright-cyan', '97': 'ansi-bright-white',
        };
        let result = '';
        let open = false;
        const parts = text.split(/\x1b\[([0-9;]*)m/);
        for (let i = 0; i < parts.length; i++) {
          if (i % 2 === 0) {
            result += parts[i].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          } else {
            const codes = parts[i].split(';');
            if (open) { result += '</span>'; open = false; }
            if (parts[i] === '0' || parts[i] === '') continue;
            const classes = [];
            for (const c of codes) {
              if (c === '1') classes.push('ansi-bold');
              else if (colorMap[c]) classes.push(colorMap[c]);
            }
            if (classes.length > 0) {
              result += `<span class="${classes.join(' ')}">`;
              open = true;
            }
          }
        }
        if (open) result += '</span>';
        return result;
      }

      function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      // Compile only (type-check)
      compileBtn.addEventListener('click', () => {
        outputEl.innerHTML = '<span style="color:#888">Compiling...</span>';
        setTimeout(() => {
          try {
            const source = sourceEl.value;
            const result = DottyCompiler.compile(source, []);
            if (result.length === 0) {
              outputEl.innerHTML = '<span style="color:#6a9955">Compilation successful — no errors or warnings.</span>';
            } else {
              outputEl.innerHTML = result.map(d => ansiToHtml(d.message)).join('\n');
            }
          } catch (e) {
            outputEl.innerHTML = `<span class="ansi-red">Exception: ${escapeHtml(e.message)}\n${escapeHtml(e.stack)}</span>`;
          }
        }, 10);
      });

      // Compile & Run (compile with -scalajs, link, execute)
      compileAndRunBtn.addEventListener('click', async () => {
        outputEl.innerHTML = '<span style="color:#888">Compiling &amp; linking...</span>';
        compileBtn.disabled = true;
        compileAndRunBtn.disabled = true;

        // Allow UI to update
        await new Promise(r => setTimeout(r, 10));

        try {
          const source = sourceEl.value;

          // Detect main class name from source
          // Look for @main def <name> or object <Name> extends App or def main in object <Name>
          let mainClass = 'main'; // default
          const mainAnnotMatch = source.match(/@main\s+def\s+(\w+)/);
          if (mainAnnotMatch) {
            mainClass = mainAnnotMatch[1];
          }

          const result = await DottyCompiler.compileAndLink(source, [], mainClass);

          if (!result.success) {
            outputEl.innerHTML = result.diagnostics.map(d => ansiToHtml(d.message)).join('\n');
          } else {
            // Show any warnings
            let html = '';
            if (result.diagnostics.length > 0) {
              html += result.diagnostics.map(d => ansiToHtml(d.message)).join('\n') + '\n';
            }

            // Execute the linked JavaScript, capturing console.log output
            const logs = [];
            const origLog = console.log;
            const origWarn = console.warn;
            const origError = console.error;
            console.log = (...args) => { logs.push(args.join(' ')); origLog(...args); };
            console.warn = (...args) => { logs.push('[warn] ' + args.join(' ')); origWarn(...args); };
            console.error = (...args) => { logs.push('[error] ' + args.join(' ')); origError(...args); };

            try {
              new Function(result.js)();
              console.log = origLog;
              console.warn = origWarn;
              console.error = origError;

              if (logs.length > 0) {
                html += '<span style="color:#6a9955">--- Program output ---</span>\n';
                html += logs.map(escapeHtml).join('\n');
              } else {
                html += '<span style="color:#6a9955">Program executed successfully (no output).</span>';
              }
            } catch (runErr) {
              console.log = origLog;
              console.warn = origWarn;
              console.error = origError;
              html += `<span class="ansi-red">Runtime error: ${escapeHtml(runErr.message)}\n${escapeHtml(runErr.stack || '')}</span>`;
              if (logs.length > 0) {
                html += '\n<span style="color:#6a9955">--- Output before error ---</span>\n';
                html += logs.map(escapeHtml).join('\n');
              }
            }

            outputEl.innerHTML = html;
          }
        } catch (e) {
          outputEl.innerHTML = `<span class="ansi-red">Exception: ${escapeHtml(e.message)}\n${escapeHtml(e.stack || '')}</span>`;
        } finally {
          compileBtn.disabled = false;
          compileAndRunBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
