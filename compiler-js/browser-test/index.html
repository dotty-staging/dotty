  <script type="text/x-scala" id="ex-canvas">
import scala.scalajs.js
import scala.util.Random

case class Circle(x: Int, y: Int, radius: Int, hue: Int)

object CircleField:
  def generate(width: Int, height: Int, count: Int, seed: Int): Vector[Circle] =
    val rng = Random(seed)
    Vector.tabulate(count) { i =>
      Circle(
        x = rng.nextInt(width),
        y = rng.nextInt(height),
        radius = 10 + rng.nextInt(40),
        hue = (i * 137) % 360
      )
    }

  def nearbyPairs(circles: Vector[Circle], maxDist: Double): Seq[(Circle, Circle)] =
    for
      i <- circles.indices
      j <- (i + 1) until circles.length
      a = circles(i)
      b = circles(j)
      if Math.hypot(b.x - a.x, b.y - a.y) < maxDist
    yield (a, b)

object Renderer:
  def drawBackground(ctx: js.Dynamic, w: Int, h: Int): Unit =
    ctx.fillStyle = "#1a1a2e"
    ctx.fillRect(0, 0, w, h)

  def drawCircle(ctx: js.Dynamic, c: Circle): Unit =
    ctx.beginPath()
    ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2)
    ctx.fillStyle = s"hsla(${c.hue}, 70%, 60%, 0.6)"
    ctx.fill()

  def drawConnection(ctx: js.Dynamic, a: Circle, b: Circle): Unit =
    ctx.beginPath()
    ctx.moveTo(a.x, a.y)
    ctx.lineTo(b.x, b.y)
    ctx.stroke()

  def drawTitle(ctx: js.Dynamic, w: Int, title: String, subtitle: String): Unit =
    ctx.fillStyle = "#e0e0e0"
    ctx.font = "bold 22px monospace"
    ctx.textAlign = "center"
    ctx.fillText(title, w / 2, 30)
    ctx.font = "14px monospace"
    ctx.fillStyle = "#888"
    ctx.fillText(subtitle, w / 2, 52)

@main def main() =
  val canvas = js.Dynamic.global.document.getElementById("appCanvas")
  canvas.style.display = "block"
  val ctx = canvas.getContext("2d")
  val w = canvas.width.asInstanceOf[Int]
  val h = canvas.height.asInstanceOf[Int]

  val circles = CircleField.generate(w, h, count = 60, seed = 42)
  val connections = CircleField.nearbyPairs(circles, maxDist = 120)

  Renderer.drawBackground(ctx, w, h)
  circles.foreach(Renderer.drawCircle(ctx, _))

  ctx.strokeStyle = "rgba(255, 255, 255, 0.08)"
  ctx.lineWidth = 1
  connections.foreach((a, b) => Renderer.drawConnection(ctx, a, b))

  Renderer.drawTitle(ctx, w, "Scala 3 + Scala.js", "Compiled and linked in the browser")
  println(s"Drew ${circles.length} circles with ${connections.length} connections")
</script>

  <script type="text/x-scala" id="ex-spirograph">
import scala.scalajs.js

case class SpiroCurve(outerR: Double, innerR: Double, pen: Double, hue: Int)

object Spirograph:
  def gcd(a: Long, b: Long): Long =
    if b == 0 then a else gcd(b, a % b)

  def trace(curve: SpiroCurve, steps: Int): Seq[(Double, Double)] =
    val SpiroCurve(bigR, r, d, _) = curve
    val period = gcd(bigR.toLong, r.toLong)
    (0 to steps).map { i =>
      val t = i * Math.PI * 2 * r / period / steps
      val x = (bigR - r) * Math.cos(t) + d * Math.cos((bigR - r) / r * t)
      val y = (bigR - r) * Math.sin(t) - d * Math.sin((bigR - r) / r * t)
      (x, y)
    }

  def draw(ctx: js.Dynamic, cx: Double, cy: Double, curve: SpiroCurve, steps: Int): Unit =
    val points = trace(curve, steps)
    ctx.beginPath()
    points.zipWithIndex.foreach { (pt, i) =>
      val (x, y) = pt
      if i == 0 then ctx.moveTo(cx + x, cy + y)
      else ctx.lineTo(cx + x, cy + y)
    }
    ctx.strokeStyle = s"hsla(${curve.hue}, 80%, 60%, 0.7)"
    ctx.lineWidth = 1.2
    ctx.stroke()

val curves = List(
  SpiroCurve(outerR = 150, innerR = 47, pen = 110, hue = 0),
  SpiroCurve(outerR = 150, innerR = 83, pen = 130, hue = 120),
  SpiroCurve(outerR = 150, innerR = 61, pen = 100, hue = 240),
)

@main def main() =
  val canvas = js.Dynamic.global.document.getElementById("appCanvas")
  canvas.style.display = "block"
  canvas.width = 600
  canvas.height = 600
  val ctx = canvas.getContext("2d")

  ctx.fillStyle = "#0d1117"
  ctx.fillRect(0, 0, 600, 600)

  val cx = 300.0
  val cy = 300.0
  curves.foreach(Spirograph.draw(ctx, cx, cy, _, steps = 3000))

  ctx.fillStyle = "#e0e0e0"
  ctx.font = "bold 18px monospace"
  ctx.textAlign = "center"
  ctx.fillText("Spirograph", 300, 28)
  ctx.font = "12px monospace"
  ctx.fillStyle = "#666"
  ctx.fillText(s"${curves.length} parametric curves, 3000 steps each", 300, 46)

  println("Spirograph rendered!")
</script>

  <script type="text/x-scala" id="ex-gameoflife">
import scala.scalajs.js

class Grid(val rows: Int, val cols: Int, cells: Array[Array[Boolean]]):
  def alive(r: Int, c: Int): Boolean = cells(r)(c)

  def countNeighbors(r: Int, c: Int): Int =
    var count: Int = 0
    for
      dr <- -1 to 1
      dc <- -1 to 1
      if !(dr == 0 && dc == 0)
      if cells((r + dr + rows) % rows)((c + dc + cols) % cols)
    do count += 1
    count

  def step: Grid =
    val next = Array.tabulate(rows, cols) { (r, c) =>
      val n = countNeighbors(r, c)
      if alive(r, c) then n == 2 || n == 3 else n == 3
    }
    Grid(rows, cols, next)

  def population: Int = cells.flatten.count(identity)

object Grid:
  def random(rows: Int, cols: Int, density: Double, seed: Int): Grid =
    val rng = scala.util.Random(seed)
    val cells = Array.tabulate(rows, cols)((_, _) => rng.nextDouble() < density)
    Grid(rows, cols, cells)

class Simulation(initial: Grid, generations: Int):
  val (finalGrid, ages) = run()

  private def run(): (Grid, Array[Array[Int]]) =
    val cellAges = Array.fill(initial.rows, initial.cols)(0: Int)
    var grid = initial
    for _ <- 0 until generations do
      grid = grid.step
      for r <- 0 until grid.rows; c <- 0 until grid.cols do
        if grid.alive(r, c) then cellAges(r)(c) += 1
        else cellAges(r)(c) = 0
    (grid, cellAges)

object LifeRenderer:
  def draw(ctx: js.Dynamic, sim: Simulation, cellSize: Int, w: Int, h: Int): Unit =
    ctx.fillStyle = "#0d1117"
    ctx.fillRect(0, 0, w, h)

    val grid = sim.finalGrid
    for r <- 0 until grid.rows; c <- 0 until grid.cols do
      if grid.alive(r, c) then
        val age = sim.ages(r)(c).min(50)
        val hue = 120 + age * 3
        val light = 40 + (age * 0.6).toInt.min(30)
        ctx.fillStyle = s"hsl($hue, 70%, $light%)"
        ctx.fillRect(c * cellSize, r * cellSize, cellSize - 1, cellSize - 1)

    ctx.fillStyle = "#e0e0e0"
    ctx.font = "bold 16px monospace"
    ctx.textAlign = "center"
    ctx.fillText(s"Game of Life — gen ${sim.ages(0)(0)}", w / 2, 20)

@main def main() =
  val w = 600
  val h = 400
  val cellSize = 4
  val generations = 200

  val canvas = js.Dynamic.global.document.getElementById("appCanvas")
  canvas.style.display = "block"
  canvas.width = w
  canvas.height = h
  val ctx = canvas.getContext("2d")

  val initial = Grid.random(h / cellSize, w / cellSize, density = 0.35, seed = 12345)
  val sim = Simulation(initial, generations)
  LifeRenderer.draw(ctx, sim, cellSize, w, h)

  val grid = sim.finalGrid
  println(s"Game of Life: ${grid.cols}x${grid.rows} grid, $generations generations")
  println(s"Live cells: ${grid.population} / ${grid.rows * grid.cols}")
</script>

  <!-- CodeMirror 6 via ESM CDN -->
  <script type="module">
    import { EditorView, basicSetup } from 'https://esm.sh/codemirror@6.0.2?target=es2022';
    import { keymap } from 'https://esm.sh/@codemirror/view@6?target=es2022';
    import { lintGutter, setDiagnostics } from 'https://esm.sh/@codemirror/lint@6?target=es2022';
    import { StreamLanguage } from 'https://esm.sh/@codemirror/language@6?target=es2022';
    import { scala } from 'https://esm.sh/@codemirror/legacy-modes@6/mode/clike?target=es2022';
    import { oneDark } from 'https://esm.sh/@codemirror/theme-one-dark@6?target=es2022';

    function getExample(name) {
      const el = document.getElementById('ex-' + name);
      return el ? el.textContent.replace(/^\n/, '') : '';
    }

    const examplesEl = document.getElementById('examples');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const compileBtn = document.getElementById('compile');
    const compileAndRunBtn = document.getElementById('compileAndRun');
    const progressEl = document.getElementById('progress');
    const canvasEl = document.getElementById('appCanvas');

    // --- Editor setup ---
    let isUserEdit = false;

    const view = new EditorView({
      parent: document.getElementById('editor-container'),
      extensions: [
        keymap.of([
          { key: 'Ctrl-Enter',       mac: 'Cmd-Enter',       run: () => { compileAndRunBtn.click(); return true; } },
          { key: 'Ctrl-Shift-Enter', mac: 'Cmd-Shift-Enter', run: () => { compileBtn.click();       return true; } },
        ]),
        basicSetup,
        oneDark,
        StreamLanguage.define(scala),
        EditorView.theme({ '&': { height: '400px' }, '.cm-scroller': { overflow: 'auto' } }),
        EditorView.updateListener.of(update => {
          if (update.docChanged && isUserEdit) examplesEl.value = 'custom';
        }),
        lintGutter(),
      ],
      doc: getExample(examplesEl.value),
    });
    isUserEdit = true;

    examplesEl.addEventListener('change', () => {
      if (examplesEl.value !== 'custom') {
        isUserEdit = false;
        view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: getExample(examplesEl.value) } });
        isUserEdit = true;
      }
    });

    // --- Utility ---
    function ansiToHtml(text) {
      const colorMap = {
        '30': 'ansi-black', '31': 'ansi-red', '32': 'ansi-green', '33': 'ansi-yellow',
        '34': 'ansi-blue', '35': 'ansi-magenta', '36': 'ansi-cyan', '37': 'ansi-white',
        '90': 'ansi-bright-red', '91': 'ansi-bright-red', '92': 'ansi-bright-green',
        '93': 'ansi-bright-yellow', '94': 'ansi-bright-blue', '95': 'ansi-bright-magenta',
        '96': 'ansi-bright-cyan', '97': 'ansi-bright-white',
      };
      let result = '';
      let open = false;
      const parts = text.split(/\x1b\[([0-9;]*)m/);
      for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0) {
          result += parts[i].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        } else {
          const codes = parts[i].split(';');
          if (open) { result += '</span>'; open = false; }
          if (parts[i] === '0' || parts[i] === '') continue;
          const classes = [];
          for (const c of codes) {
            if (c === '1') classes.push('ansi-bold');
            else if (colorMap[c]) classes.push(colorMap[c]);
          }
          if (classes.length > 0) { result += '<span class="' + classes.join(' ') + '">'; open = true; }
        }
      }
      if (open) result += '</span>';
      return result;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setEditorMarkers(diagnostics) {
      const cmDiags = diagnostics
        .filter(d => d.line >= 0)
        .map(d => {
          const lineNum = Math.min(d.line + 1, view.state.doc.lines);
          const line = view.state.doc.line(lineNum);
          const from = line.from + Math.min(d.column, line.length);
          return {
            from,
            to: Math.min(from + 1, line.to),
            severity: d.severity === 'error' ? 'error' : d.severity === 'warning' ? 'warning' : 'info',
            message: d.message.replace(/\x1b\[[0-9;]*m/g, ''),
          };
        });
      view.dispatch(setDiagnostics(view.state, cmDiags));
    }

    // --- Compiler loading ---
    function fetchWithProgress(url, barEl, pctEl) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'arraybuffer';
        xhr.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            barEl.style.width = pct + '%';
            pctEl.textContent = pct + '%';
          } else {
            const mb = (e.loaded / 1048576).toFixed(1);
            pctEl.textContent = mb + ' MB';
            barEl.style.width = '50%';
          }
        };
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            barEl.style.width = '100%';
            pctEl.textContent = '100%';
            resolve(xhr.response);
          } else {
            reject(new Error('HTTP ' + xhr.status + ' for ' + url));
          }
        };
        xhr.onerror = () => reject(new Error('Network error fetching ' + url));
        xhr.send();
      });
    }

    (async function() {
      statusEl.textContent = 'Downloading compiler, classpath, and linker libs...';
      progressEl.classList.add('active');

      const barJs = document.getElementById('bar-js');
      const pctJs = document.getElementById('pct-js');
      const barCp = document.getElementById('bar-cp');
      const pctCp = document.getElementById('pct-cp');
      const barLl = document.getElementById('bar-ll');
      const pctLl = document.getElementById('pct-ll');

      let jsBuf, cpBuf, llBuf;
      try {
        [jsBuf, cpBuf, llBuf] = await Promise.all([
          fetchWithProgress('main.js', barJs, pctJs),
          fetchWithProgress('classpath.bin', barCp, pctCp),
          fetchWithProgress('linker-libs.bin', barLl, pctLl),
        ]);
      } catch (e) {
        statusEl.textContent = 'Download failed: ' + e.message;
        return;
      }

      statusEl.textContent = 'Initializing compiler...';
      await new Promise((resolve, reject) => {
        const blob = new Blob([jsBuf], { type: 'application/javascript' });
        const script = document.createElement('script');
        script.src = URL.createObjectURL(blob);
        script.onload = () => { URL.revokeObjectURL(script.src); resolve(); };
        script.onerror = () => reject(new Error('Failed to execute main.js'));
        document.head.appendChild(script);
      });

      statusEl.textContent = 'Loading classpath...';
      DottyCompiler.loadClasspath(cpBuf);

      statusEl.textContent = 'Loading linker libraries...';
      DottyCompiler.loadLinkerLibs(llBuf);

      progressEl.classList.remove('active');
      statusEl.textContent = 'Ready!';
      compileBtn.disabled = false;
      compileAndRunBtn.disabled = false;
      examplesEl.disabled = false;

      // --- Compile ---
      compileBtn.addEventListener('click', () => {
        outputEl.innerHTML = '<span style="color:#888">Compiling...</span>';
        setTimeout(() => {
          try {
            const source = view.state.doc.toString();
            const result = DottyCompiler.compile(source, []);
            setEditorMarkers(result);
            if (result.length === 0) {
              outputEl.innerHTML = '<span style="color:#6a9955">Compilation successful — no errors or warnings.</span>';
            } else {
              outputEl.innerHTML = result.map(d => ansiToHtml(d.message)).join('\n');
            }
          } catch (e) {
            outputEl.innerHTML = '<span class="ansi-red">Exception: ' + escapeHtml(e.message) + '\n' + escapeHtml(e.stack) + '</span>';
          }
        }, 10);
      });

      // --- Compile & Run ---
      compileAndRunBtn.addEventListener('click', async () => {
        outputEl.innerHTML = '<span style="color:#888">Compiling &amp; linking...</span>';
        compileBtn.disabled = true;
        compileAndRunBtn.disabled = true;

        canvasEl.style.display = 'none';
        const cCtx = canvasEl.getContext('2d');
        canvasEl.width = 600; canvasEl.height = 400;
        cCtx.clearRect(0, 0, 600, 400);

        await new Promise(r => setTimeout(r, 10));

        try {
          const source = view.state.doc.toString();

          let mainClass = 'main';
          const mainAnnotMatch = source.match(/@main\s+def\s+(\w+)/);
          if (mainAnnotMatch) mainClass = mainAnnotMatch[1];

          const result = await DottyCompiler.compileAndLink(source, [], mainClass);
          setEditorMarkers(result.diagnostics || []);

          if (!result.success) {
            outputEl.innerHTML = result.diagnostics.map(d => ansiToHtml(d.message)).join('\n');
          } else {
            let html = '';
            if (result.diagnostics.length > 0) {
              html += result.diagnostics.map(d => ansiToHtml(d.message)).join('\n') + '\n';
            }

            const logs = [];
            const origLog = console.log, origWarn = console.warn, origError = console.error;
            console.log   = (...args) => { logs.push(args.join(' '));           origLog(...args); };
            console.warn  = (...args) => { logs.push('[warn] ' + args.join(' ')); origWarn(...args); };
            console.error = (...args) => { logs.push('[error] ' + args.join(' ')); origError(...args); };

            try {
              new Function(result.js)();
              console.log = origLog; console.warn = origWarn; console.error = origError;
              if (logs.length > 0) {
                html += '<span style="color:#6a9955">--- Program output ---</span>\n';
                html += logs.map(escapeHtml).join('\n');
              } else {
                html += '<span style="color:#6a9955">Program executed successfully (no output).</span>';
              }
            } catch (runErr) {
              console.log = origLog; console.warn = origWarn; console.error = origError;
              html += '<span class="ansi-red">Runtime error: ' + escapeHtml(runErr.message) + '\n' + escapeHtml(runErr.stack || '') + '</span>';
              if (logs.length > 0) {
                html += '\n<span style="color:#6a9955">--- Output before error ---</span>\n';
                html += logs.map(escapeHtml).join('\n');
              }
            }

            outputEl.innerHTML = html;
          }
        } catch (e) {
          outputEl.innerHTML = '<span class="ansi-red">Exception: ' + escapeHtml(e.message) + '\n' + escapeHtml(e.stack || '') + '</span>';
        } finally {
          compileBtn.disabled = false;
          compileAndRunBtn.disabled = false;
        }
